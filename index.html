<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>uhew</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

/* intro */
#intro {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 24px;
  cursor: pointer;
}

/* UI wrapper */
#ui {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  perspective: 1000px;
}

/* panel */
.panel {
  width: 380px;
  height: 180px;
  background: rgba(0,255,255,0.08);
  border: 1px solid rgba(0,255,255,0.4);
  border-radius: 16px;
  backdrop-filter: blur(10px);
  color: white;

  display: flex;
  align-items: center;
  padding: 15px;
  gap: 15px;

  transform-style: preserve-3d;
}

/* image */
.image {
  width: 120px;
  height: 120px;
  border-radius: 16px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.2);
}

/* button */
button {
  margin-top: 10px;
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  background: cyan;
  cursor: pointer;
  font-weight: bold;
}

/* particles */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  animation: fade 0.6s linear forwards;
}

@keyframes fade {
  to {
    opacity: 0;
    transform: scale(0.2);
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">[click]</div>

<!-- MUSIC -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- UI -->
<div id="ui">
  <div class="panel" id="panel">

    <img class="image" src="uhewufin.png" />

    <div>
      <div style="font-size:20px;">uhewufin</div>

      <button onclick="window.location.href='https://discord.com'">
        Discord
      </button>

    </div>

  </div>
</div>

<script>
document.title = "uhew";

const intro = document.getElementById("intro");
const ui = document.getElementById("ui");
const bgm = document.getElementById("bgm");
const panel = document.getElementById("panel");

let enabled = false;

// start
intro.addEventListener("click", () => {
  intro.style.display = "none";
  ui.style.display = "flex";
  enabled = true;

  bgm.play().catch(() => {});
});

// rotation
let targetX = 0, targetY = 0;
let currentX = 0, currentY = 0;

const strength = 160;

// mouse
document.addEventListener("mousemove", (e) => {
  if (!enabled) return;

  targetX = (e.clientX / window.innerWidth - 0.5) * strength;
  targetY = (e.clientY / window.innerHeight - 0.5) * -strength;

  spawnParticle(e.clientX, e.clientY);
});

// touch
document.addEventListener("touchmove", (e) => {
  if (!enabled) return;

  const t = e.touches[0];
  targetX = (t.clientX / window.innerWidth - 0.5) * strength;
  targetY = (t.clientY / window.innerHeight - 0.5) * -strength;
});

// particles
function spawnParticle(x, y) {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);

  setTimeout(() => p.remove(), 600);
}

// smooth animation
function animate() {
  currentX += (targetX - currentX) * 0.08;
  currentY += (targetY - currentY) * 0.08;

  panel.style.transform =
    `rotateY(${currentX}deg) rotateX(${currentY}deg) translateZ(40px) scale(1.05)`;

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
