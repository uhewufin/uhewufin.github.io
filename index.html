<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>uhew</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

#intro {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 24px;
  cursor: pointer;
}

#ui {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  perspective: 1000px;
}

.panel {
  width: 380px;
  height: 180px;
  background: rgba(0,255,255,0.08);
  border: 1px solid rgba(0,255,255,0.4);
  border-radius: 16px;
  backdrop-filter: blur(10px);
  color: white;

  display: flex;
  align-items: center;
  padding: 15px;
  gap: 15px;

  transform-style: preserve-3d;
  transform: scale(1);
}

.image {
  width: 120px;
  height: 120px;
  border-radius: 16px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.2);
}

button {
  margin-top: 10px;
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  background: cyan;
  cursor: pointer;
  font-weight: bold;
}

.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  animation: fade 0.6s linear forwards;
}

@keyframes fade {
  to {
    opacity: 0;
    transform: scale(0.2);
  }
}
</style>
</head>

<body>

<div id="intro">[click]</div>

<audio id="bgm" src="fire.mp3" loop></audio>

<div id="ui">
  <div class="panel" id="panel">
    <img class="image" src="uhewufin.png" />

    <div>
      <div style="font-size:20px;">uhewufin</div>

      <button onclick="window.location.href='https://discord.com'">
        Discord
      </button>
    </div>
  </div>
</div>

<script>
document.title = "uhew";

const intro = document.getElementById("intro");
const ui = document.getElementById("ui");
const bgm = document.getElementById("bgm");
const panel = document.getElementById("panel");

let enabled = false;

// AUDIO ANALYSIS
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const source = audioCtx.createMediaElementSource(bgm);
const analyser = audioCtx.createAnalyser();

source.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize = 256;

const dataArray = new Uint8Array(analyser.frequencyBinCount);

// START
intro.addEventListener("click", () => {
  intro.style.display = "none";
  ui.style.display = "flex";
  enabled = true;

  audioCtx.resume();
  bgm.play().catch(() => {});
});

// ROTATION
let targetX = 0, targetY = 0;
let currentX = 0, currentY = 0;

const strength = 160;

// mouse
document.addEventListener("mousemove", (e) => {
  if (!enabled) return;

  targetX = (e.clientX / window.innerWidth - 0.5) * strength;
  targetY = (e.clientY / window.innerHeight - 0.5) * -strength;

  spawnParticle(e.clientX, e.clientY);
});

// touch
document.addEventListener("touchmove", (e) => {
  if (!enabled) return;

  const t = e.touches[0];
  targetX = (t.clientX / window.innerWidth - 0.5) * strength;
  targetY = (t.clientY / window.innerHeight - 0.5) * -strength;
});

// particles
function spawnParticle(x, y) {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);

  setTimeout(() => p.remove(), 600);
}

// ANIMATION LOOP
function animate() {
  // smooth rotation
  currentX += (targetX - currentX) * 0.08;
  currentY += (targetY - currentY) * 0.08;

  // audio volume analysis
  analyser.getByteFrequencyData(dataArray);

  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    sum += dataArray[i];
  }

  let avg = sum / dataArray.length; // 0 - 255
  let scale = 0.7 + avg / 150;        // smooth scaling effect

  panel.style.transform =
    `rotateY(${currentX}deg) rotateX(${currentY}deg) scale(${scale})`;

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
