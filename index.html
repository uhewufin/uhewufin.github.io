<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>uhew</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

#intro {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 24px;
  cursor: pointer;
}

/* fade-in UI */
#ui {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  perspective: 1000px;
  opacity: 0;
  transition: opacity 1s ease;
}

#ui.show {
  opacity: 1;
}

.panel {
  width: 380px;
  height: 180px;
  background: rgba(0,255,255,0.08);
  border: 1px solid rgba(0,255,255,0.4);
  border-radius: 16px;
  backdrop-filter: blur(10px);
  color: white;

  display: flex;
  align-items: center;
  padding: 15px;
  gap: 15px;

  transform-style: preserve-3d;
}

.image {
  width: 120px;
  height: 120px;
  border-radius: 16px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.2);
}

.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  color: white;
  transition: filter 0.15s ease;
}

button:hover {
  filter: brightness(1.15);
}

/* button colors */
.discord-btn {
  background: #5566fb;
}

.roblox-btn {
  background: #335ffd;
}

.recroom-btn {
  background: #ff5900;
}

.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  animation: fade 0.6s linear forwards;
}

@keyframes fade {
  to {
    opacity: 0;
    transform: scale(0.2);
  }
}
</style>
</head>

<body>

<!-- changed text -->
<div id="intro">[ click ]</div>

<audio id="bgm" src="fire.mp3" loop></audio>

<div id="ui">
  <div class="panel" id="panel">
    <img class="image" src="uhewufin.png" />

    <div>
      <div style="font-size:20px;">uhewufin</div>

      <div class="btn-row">
        <button class="discord-btn"
          onclick="window.open('https://discord.com/users/1341644324017799239', '_blank')">
          Discord
        </button>

        <button class="roblox-btn"
          onclick="window.open('https://www.roblox.com/users/2465926493/profile', '_blank')">
          Roblox
        </button>

        <button class="recroom-btn"
          onclick="window.open('https://rec.net/user/liampark2021', '_blank')">
          Rec Room
        </button>
      </div>
    </div>
  </div>
</div>

<script>
document.title = "uhew";

const intro = document.getElementById("intro");
const ui = document.getElementById("ui");
const bgm = document.getElementById("bgm");
const panel = document.getElementById("panel");

let enabled = false;

// AUDIO ANALYSIS
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const source = audioCtx.createMediaElementSource(bgm);
const analyser = audioCtx.createAnalyser();

source.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize = 256;
const dataArray = new Uint8Array(analyser.frequencyBinCount);

// START
intro.addEventListener("click", () => {
  intro.style.display = "none";
  ui.style.display = "flex";

  // trigger fade-in
  setTimeout(() => ui.classList.add("show"), 10);

  enabled = true;

  audioCtx.resume();
  bgm.play().catch(() => {});
});

// ROTATION
let targetX = 0, targetY = 0;
let currentX = 0, currentY = 0;

const strength = 240;

document.addEventListener("mousemove", (e) => {
  if (!enabled) return;

  targetX = (e.clientX / window.innerWidth - 0.5) * strength;
  targetY = (e.clientY / window.innerHeight - 0.5) * -strength;

  spawnParticle(e.clientX, e.clientY);
});

// particles
function spawnParticle(x, y) {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);

  setTimeout(() => p.remove(), 600);
}

// ANIMATION LOOP
function animate() {
  currentX += (targetX - currentX) * 0.08;
  currentY += (targetY - currentY) * 0.08;

  analyser.getByteFrequencyData(dataArray);

  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];

  let avg = sum / dataArray.length;
  let scale = 1 + avg / 350;

  panel.style.transform =
    `rotateY(${currentX}deg) rotateX(${currentY}deg) scale(${scale})`;

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
